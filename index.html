<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline Audit Form</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>Audit Form</h1>

<form id="auditForm">

<input id="auditName" placeholder="Audit Name" required>

<input id="auditor" placeholder="Auditor Name" required>

<select id="status">

<option value="Pass">Pass</option>
<option value="Fail">Fail</option>

</select>

<textarea id="remarks" placeholder="Remarks"></textarea>

<button type="submit">Save Audit</button>

</form>

<button onclick="syncAudits()">Sync Now</button>

<script src="db.js"></script>
<script src="sync.js"></script>
<script src="app.js"></script>

</body>
</html>
